<!DOCTYPE html>
<html>
<head>
  <title>Jugaad Diagnostics</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;

    }
    header {
      padding: 40px;
      text-align: center;
      background: #1e293b;

      font-size: 40px;

    .container {
